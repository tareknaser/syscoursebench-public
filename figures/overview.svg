<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 230" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#9ca3af"/>
    </marker>
    <marker id="ah-d" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="720" height="230" fill="white"/>

  <!-- ============ ROW 1: SOURCE ============ -->
  <text x="360" y="16" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">University Systems Courses</text>

  <!-- Fork arrows -->
  <path d="M 280,22 L 280,28 L 112,38" stroke="#b0b5bc" stroke-width="1.2" fill="none" marker-end="url(#ah)"/>
  <path d="M 440,22 L 440,28 L 608,38" stroke="#b0b5bc" stroke-width="1.2" fill="none" marker-end="url(#ah)"/>

  <!-- ============ ROW 2: THREE-COLUMN LAYOUT ============ -->

  <!-- LEFT: SysExam -->
  <rect x="4" y="40" width="210" height="112" rx="6" fill="#fafbfc" stroke="#d1d5db" stroke-width="1.2"/>
  <text x="109" y="62" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">SysExam</text>

  <line x1="16" y1="72" x2="202" y2="72" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="109" y="86" text-anchor="middle" font-size="9.5" fill="#9ca3af" font-weight="600" letter-spacing="1px">GRADING</text>

  <rect x="14" y="93" width="88" height="20" rx="3" fill="#eff6ff" stroke="#bfdbfe" stroke-width="0.7"/>
  <text x="58" y="107" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="500">ExactMatch</text>

  <rect x="108" y="93" width="96" height="20" rx="3" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="0.7"/>
  <text x="156" y="107" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="500">LLM Judge</text>

  <!-- Arrow to output -->
  <line x1="109" y1="118" x2="109" y2="128" stroke="#9ca3af" stroke-width="1" marker-end="url(#ah)"/>
  <rect x="14" y="134" width="190" height="22" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.8"/>
  <text x="109" y="149" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Knowledge Score (%)</text>

  <!-- RIGHT: SysLab -->
  <rect x="506" y="40" width="210" height="112" rx="6" fill="#fafbfc" stroke="#d1d5db" stroke-width="1.2"/>
  <text x="611" y="62" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">SysLab</text>

  <line x1="518" y1="72" x2="704" y2="72" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="611" y="86" text-anchor="middle" font-size="9.5" fill="#9ca3af" font-weight="600" letter-spacing="1px">GRADING</text>

  <rect x="538" y="93" width="146" height="20" rx="3" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="0.7"/>
  <text x="611" y="107" text-anchor="middle" font-size="10" fill="#059669" font-weight="500">evaluate.sh → Pass / Fail</text>

  <line x1="611" y1="118" x2="611" y2="128" stroke="#9ca3af" stroke-width="1" marker-end="url(#ah)"/>
  <rect x="516" y="134" width="190" height="22" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.8"/>
  <text x="611" y="149" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Pass Rate (%)</text>

  <!-- CENTER: SHARED DOMAINS -->
  <!-- 4 domains at y=58, 80, 102, 124 -->

  <!-- Operating Systems -->
  <line x1="218" y1="58" x2="502" y2="58" stroke="#e5e7eb" stroke-width="0.8"/>
  <rect x="296" y="47" width="138" height="22" fill="white"/>
  <circle cx="308" cy="58" r="4.5" fill="#3b82f6"/>
  <text x="320" y="58" dominant-baseline="central" font-size="12" fill="#374151" font-weight="500">Operating Systems</text>

  <!-- Distributed Systems -->
  <line x1="218" y1="80" x2="502" y2="80" stroke="#e5e7eb" stroke-width="0.8"/>
  <rect x="296" y="69" width="148" height="22" fill="white"/>
  <circle cx="308" cy="80" r="4.5" fill="#f59e0b"/>
  <text x="320" y="80" dominant-baseline="central" font-size="12" fill="#374151" font-weight="500">Distributed Systems</text>

  <!-- Database Systems -->
  <line x1="218" y1="102" x2="502" y2="102" stroke="#e5e7eb" stroke-width="0.8"/>
  <rect x="296" y="91" width="138" height="22" fill="white"/>
  <circle cx="308" cy="102" r="4.5" fill="#10b981"/>
  <text x="320" y="102" dominant-baseline="central" font-size="12" fill="#374151" font-weight="500">Database Systems</text>

  <!-- Intro to Systems -->
  <line x1="218" y1="124" x2="502" y2="124" stroke="#e5e7eb" stroke-width="0.8"/>
  <rect x="296" y="113" width="126" height="22" fill="white"/>
  <circle cx="308" cy="124" r="4.5" fill="#8b5cf6"/>
  <text x="320" y="124" dominant-baseline="central" font-size="12" fill="#374151" font-weight="500">Intro to Systems</text>

  <!-- ============ ROW 3: CONVERGENCE BOX ============ -->
  <path d="M 109,172 L 109,182 L 290,206" stroke="#6b7280" stroke-width="1.2" fill="none" marker-end="url(#ah-d)"/>
  <path d="M 611,172 L 611,182 L 430,206" stroke="#6b7280" stroke-width="1.2" fill="none" marker-end="url(#ah-d)"/>

  <rect x="246" y="196" width="228" height="30" rx="6" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.4"/>
  <text x="360" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Knowledge–Implementation Gap</text>

</svg>
